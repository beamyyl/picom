# By beamyyl, for better pcs
backend = "glx";
vsync = true;
use-damage = true;

# --- Animations ---
animations = (
  {
    triggers = ["open", "show"];
    preset = "appear";
    duration = 0.2;
    scale = 0.9;
  },
  {
    triggers = ["close", "hide"];
    preset = "disappear";
    duration = 0.2;
    scale = 0.9;
  },
  {
    triggers = ["resize", "geometry"];
    preset = "geometry-change";
    duration = 0.15;
  }
)

# --- Fading ---
fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;

# --- Blur ---
blur-method = "dual_kawase"; 
blur-strength = 3; 
blur-background = true;

# --- Shadows ---
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.35;

# --- Rules ---
rules = (
  {
    match = "any";
    active-opacity = 1.0;
    inactive-opacity = 0.90;
  },
  {
    match = "class_g = 'Polybar' || class_g = 'slop'";
    shadow = false;
    blur-background = false;
    animations = ({ preset = "none"; });
  }
)
